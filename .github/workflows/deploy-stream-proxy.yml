name: Deploy Stream Proxy Worker

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "ops/stream-proxy-worker.js"
      - "wrangler.toml"
      - ".github/workflows/deploy-stream-proxy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
